name: Feature request
description: Suggest a new feature or enhancement for MediKeep
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve, not just the solution you have in mind — it makes it easier to explore alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do today that is hard, missing, or frustrating?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should MediKeep behave? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, screenshots, links, or alternatives you've considered.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
